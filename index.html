<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="小小學習樂園">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#87CEEB">
<title>小小學習樂園 🌈</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --coral:#FF6B6B;--mint:#6BCB77;--purple:#B388FF;
  --orange:#FF9A3C;--blue:#4FC3F7;--pink:#FF80AB;
  --sun:#FFD93D;--dark:#3D3353;
  --shadow:rgba(61,51,83,.15);--r:22px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{
  font-family:'Nunito',sans-serif;
  background:linear-gradient(180deg,#87CEEB 0%,#B8E4FF 45%,#C8F5A0 75%,#7EC850 100%) fixed;
  min-height:100%;overflow-x:hidden;
  user-select:none;-webkit-user-select:none;-webkit-touch-callout:none;
}

/* ── DECORATIONS ── */
.cloud{position:fixed;background:#fff;border-radius:50px;opacity:.8;animation:float-cloud linear infinite;pointer-events:none;z-index:0}
.cloud::before,.cloud::after{content:'';position:absolute;background:#fff;border-radius:50%}
.c1{width:120px;height:40px;top:6%;left:-130px;animation-duration:30s}
.c1::before{width:55px;height:55px;top:-28px;left:15px}
.c1::after{width:42px;height:42px;top:-20px;left:55px}
.c2{width:90px;height:30px;top:14%;left:-100px;animation-duration:24s;animation-delay:10s}
.c2::before{width:44px;height:44px;top:-24px;left:12px}
.c2::after{width:34px;height:34px;top:-16px;left:40px}
.c3{width:160px;height:48px;top:2%;left:-170px;animation-duration:38s;animation-delay:18s}
.c3::before{width:72px;height:72px;top:-40px;left:20px}
.c3::after{width:58px;height:58px;top:-28px;left:70px}
@keyframes float-cloud{to{left:110%}}
.sun{position:fixed;top:16px;right:16px;width:68px;height:68px;background:var(--sun);border-radius:50%;
  box-shadow:0 0 30px rgba(255,217,61,.6);animation:sun-pulse 3s ease-in-out infinite;z-index:1}
@keyframes sun-pulse{0%,100%{box-shadow:0 0 30px rgba(255,217,61,.6)}50%{box-shadow:0 0 55px rgba(255,217,61,.9)}}

/* ── SCREENS ── */
.screen{
  position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;
  padding:14px 14px 34px;overflow-y:auto;-webkit-overflow-scrolling:touch;
  opacity:0;pointer-events:none;transform:translateY(14px);
  transition:opacity .28s ease,transform .28s ease;
}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}

/* ═══════ HOME ═══════ */
#s-home{justify-content:center}
.home-row{font-size:clamp(2.6rem,11vw,4.5rem);letter-spacing:6px;
  animation:bounce-row 1.1s ease-in-out infinite alternate;margin-bottom:12px}
@keyframes bounce-row{from{transform:translateY(0)}to{transform:translateY(-13px)}}
.home-title{font-family:'Fredoka One',cursive;font-size:clamp(1.8rem,7vw,3rem);color:#fff;
  text-shadow:0 4px 0 #6B8FD4,0 7px 18px rgba(0,0,0,.2);margin-bottom:4px;text-align:center}
.home-sub{font-size:.92rem;color:rgba(255,255,255,.9);font-weight:800;margin-bottom:22px;text-align:center}
.home-grid{display:flex;gap:14px;width:100%;max-width:700px;justify-content:center;flex-wrap:wrap}
.home-card{
  background:rgba(255,255,255,.93);border-radius:var(--r);padding:28px 18px 22px;
  text-align:center;cursor:pointer;width:140px;
  box-shadow:0 6px 0 rgba(0,0,0,.11),0 10px 24px var(--shadow);
  transition:transform .14s;-webkit-tap-highlight-color:transparent;
  border-top:6px solid transparent;display:flex;flex-direction:column;align-items:center;
}
.home-card:active{transform:scale(.95)}
.hc-icon{font-size:3.4rem;display:block;margin-bottom:10px}
.hc-name{font-family:'Fredoka One',cursive;font-size:clamp(1.1rem,4.5vw,1.4rem);color:var(--dark)}
.hc-desc{font-size:clamp(.7rem,2.6vw,.82rem);font-weight:700;color:#aaa;margin-top:6px}

/* ═══════ SHARED ═══════ */
.back-btn{
  align-self:flex-start;background:rgba(255,255,255,.85);border:none;border-radius:50px;
  padding:8px 20px;font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;
  cursor:pointer;color:var(--dark);box-shadow:0 3px 10px var(--shadow);margin-bottom:12px;
  -webkit-tap-highlight-color:transparent;display:flex;align-items:center;gap:5px;
}
.back-btn:active{transform:translateY(2px)}
.sec-title{font-family:'Fredoka One',cursive;font-size:clamp(1.5rem,5.5vw,2.2rem);
  color:#fff;text-shadow:0 3px 0 #6B8FD4;margin-bottom:14px;text-align:center}
.ghdr{width:100%;max-width:480px;margin-bottom:8px}
.top-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.back-mini{
  background:rgba(255,255,255,.85);border:none;border-radius:50%;width:38px;height:38px;
  font-size:1.15rem;cursor:pointer;box-shadow:0 2px 8px var(--shadow);flex-shrink:0;
  -webkit-tap-highlight-color:transparent;display:flex;align-items:center;justify-content:center;
}
.back-mini:active{transform:scale(.9)}
.cat-pill{background:rgba(255,255,255,.85);border-radius:50px;padding:5px 14px;
  font-size:.82rem;font-weight:800;color:var(--dark);box-shadow:0 2px 8px var(--shadow)}
.score-pill{margin-left:auto;background:rgba(255,255,255,.85);border-radius:50px;
  padding:5px 14px;font-size:.88rem;font-weight:800;color:var(--dark);box-shadow:0 2px 8px var(--shadow)}
.prog-labels{display:flex;justify-content:space-between;font-size:.72rem;font-weight:800;
  color:rgba(255,255,255,.92);text-shadow:0 1px 3px rgba(0,0,0,.2);margin-bottom:4px}
.prog-bg{height:11px;background:rgba(255,255,255,.35);border-radius:20px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,.08)}
.prog-fill{height:100%;background:linear-gradient(90deg,#FFD93D,#FF9A3C);border-radius:20px;
  transition:width .4s cubic-bezier(.34,1.56,.64,1)}

/* ═══════ CATEGORY SELECT ═══════ */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:420px}
.cat-card{
  background:rgba(255,255,255,.92);border-radius:18px;padding:16px 10px;text-align:center;
  cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.09),0 7px 16px var(--shadow);
  transition:transform .14s;-webkit-tap-highlight-color:transparent;
}
.cat-card:active{transform:scale(.95)}
.cat-card.all{grid-column:1/-1;padding:13px}
.c-icon{font-size:2.4rem;display:block;margin-bottom:4px}
.c-name{font-family:'Fredoka One',cursive;font-size:1.05rem}
.c-count{font-size:.72rem;font-weight:700;color:#bbb;margin-top:2px}

/* ═══════ QUIZ ═══════ */
.q-card{
  background:rgba(255,255,255,.93);border-radius:var(--r);padding:16px 26px;
  text-align:center;max-width:480px;width:100%;margin-bottom:14px;
  box-shadow:0 8px 26px var(--shadow),0 0 0 4px rgba(255,255,255,.6);
}
.q-label{font-size:.78rem;color:#aaa;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.q-word{font-family:'Fredoka One',cursive;font-size:clamp(2rem,9vw,3.5rem);color:var(--dark);line-height:1.1}
.q-zh-line{font-size:clamp(1.5rem,6vw,2.4rem);font-weight:900;color:#E05555;margin-top:3px;line-height:1.2}
.q-zy-line{font-size:clamp(1rem,4.5vw,1.7rem);color:#7B68EE;font-weight:800;margin-top:3px;letter-spacing:3px}
.q-word.bounce{animation:wbounce .4s ease}
@keyframes wbounce{0%{transform:scale(1)}40%{transform:scale(1.22)}70%{transform:scale(.96)}100%{transform:scale(1)}}
.speak-btn{
  display:inline-flex;align-items:center;gap:7px;
  background:linear-gradient(135deg,#6BCB77,#4CAF50);
  color:#fff;border:none;border-radius:50px;padding:9px 22px;
  font-family:'Nunito',sans-serif;font-size:.92rem;font-weight:800;
  cursor:pointer;margin-top:9px;
  box-shadow:0 4px 0 #388E3C,0 6px 14px rgba(76,175,80,.3);
  transition:transform .1s,box-shadow .1s;-webkit-tap-highlight-color:transparent;
}
.speak-btn:active{transform:translateY(3px);box-shadow:0 1px 0 #388E3C}
.speak-btn.speaking{animation:sp-pulse .55s ease infinite alternate}
@keyframes sp-pulse{from{transform:scale(1)}to{transform:scale(1.06)}}
.opts-grid{display:grid;grid-template-columns:1fr 1fr;gap:11px;max-width:440px;width:100%}
.opt-card{
  background:#fff;border-radius:var(--r);padding:13px 8px 10px;text-align:center;
  cursor:pointer;box-shadow:0 6px 0 rgba(0,0,0,.11),0 10px 22px var(--shadow);
  transition:transform .14s,box-shadow .14s;border:4px solid transparent;
  -webkit-tap-highlight-color:transparent;
}
.opt-card:hover:not(.disabled){transform:translateY(-4px)}
.opt-card:active:not(.disabled){transform:scale(.95)}
.oe{font-size:clamp(2.8rem,11vw,4rem);display:block;line-height:1;margin-bottom:4px}
.on{font-family:'Fredoka One',cursive;font-size:clamp(.88rem,3.4vw,1.2rem);color:var(--dark)}
.oz{font-size:clamp(.68rem,2.1vw,.82rem);font-weight:800;color:#bbb;margin-top:1px;line-height:1.3}
.oz-zy{font-size:clamp(.58rem,1.8vw,.72rem);color:#7B68EE;font-weight:700;margin-top:1px}
.opt-card:nth-child(1) .on,.opt-card:nth-child(1) .oz{color:#E05555}
.opt-card:nth-child(2) .on,.opt-card:nth-child(2) .oz{color:#4A7CC7}
.opt-card:nth-child(3) .on,.opt-card:nth-child(3) .oz{color:#3B9E50}
.opt-card:nth-child(4) .on,.opt-card:nth-child(4) .oz{color:#C88A00}
.opt-card.correct{border-color:var(--mint);background:#F0FFF4;animation:cpop .5s ease forwards}
.opt-card.wrong{border-color:var(--coral);background:#FFF5F5;animation:cshake .45s ease}
.opt-card.disabled{pointer-events:none;opacity:.35}
@keyframes cpop{0%{transform:scale(1)}30%{transform:scale(1.18)}60%{transform:scale(.95)}100%{transform:scale(1.05)}}
@keyframes cshake{0%,100%{transform:translateX(0)}15%{transform:translateX(-10px) rotate(-2deg)}35%{transform:translateX(10px) rotate(2deg)}55%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ═══════ 認識自己 ═══════ */
.self-nav{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.self-tab{background:#fff;border:3px solid #ddd;border-radius:50px;padding:8px 18px;
  font-family:'Nunito',sans-serif;font-size:clamp(.8rem,3vw,.95rem);font-weight:800;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;color:var(--dark)}
.self-tab.active{border-color:var(--coral);background:var(--coral);color:#fff}
.self-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:10px;
  max-width:560px;width:100%}
.self-card{background:#fff;border-radius:18px;padding:14px 8px 12px;text-align:center;
  cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.08),0 7px 18px var(--shadow);
  transition:transform .15s;border:3px solid transparent;-webkit-tap-highlight-color:transparent}
.self-card:hover{transform:translateY(-3px)}
.self-card:active{transform:scale(.94)}
.self-card.playing{border-color:var(--coral);background:#FFF5F5;animation:cpop .4s ease}
.self-emoji{font-size:clamp(2rem,8vw,3rem);display:block;margin-bottom:4px}
.self-en{font-family:'Fredoka One',cursive;font-size:clamp(.7rem,2.5vw,.9rem);color:var(--dark)}
.self-zh{font-size:clamp(.7rem,2.5vw,.88rem);font-weight:800;color:var(--coral);margin-top:2px}

/* ═══════ 注音學習 ═══════ */
.zy-intro{background:rgba(255,255,255,.9);border-radius:var(--r);padding:12px 20px;
  max-width:500px;width:100%;margin-bottom:12px;text-align:center;box-shadow:0 5px 22px var(--shadow)}
.zy-intro-text{font-size:clamp(.92rem,3.5vw,1.1rem);font-weight:800;color:var(--dark);line-height:1.7}
.zy-nav{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap;justify-content:center}
.zy-cat-btn{background:#fff;border:3px solid #ddd;border-radius:50px;padding:7px 16px;
  font-family:'Nunito',sans-serif;font-size:clamp(.78rem,2.8vw,.92rem);font-weight:800;
  cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;color:var(--dark)}
.zy-cat-btn.active{border-color:#7B68EE;background:#7B68EE;color:#fff}
.zy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:10px;
  max-width:560px;width:100%}
.zy-card{background:#fff;border-radius:18px;padding:13px 8px 11px;text-align:center;
  cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.08),0 7px 18px var(--shadow);
  transition:transform .15s;border:3px solid transparent;-webkit-tap-highlight-color:transparent}
.zy-card:hover{transform:translateY(-3px)}
.zy-card:active{transform:scale(.94)}
.zy-card.playing{border-color:#7B68EE;background:#F5F0FF;animation:cpop .4s ease}
.zy-sym{font-size:clamp(2.2rem,9vw,3.2rem);font-weight:900;color:#7B68EE;line-height:1;display:block}
.zy-type{font-size:clamp(.6rem,2.2vw,.73rem);font-weight:800;color:#bbb;letter-spacing:1px;margin-top:3px}
.zy-example{font-size:clamp(.88rem,3.5vw,1.08rem);font-weight:800;color:#E05555;margin-top:4px}
.zy-reading{font-size:clamp(.72rem,2.5vw,.85rem);color:#7B68EE;font-weight:800;margin-top:2px}

/* zy modal */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:300;
  display:none;align-items:center;justify-content:center;padding:20px}
.modal-overlay.show{display:flex}
.modal-card{background:#fff;border-radius:30px;padding:30px 34px;text-align:center;
  max-width:340px;width:100%;box-shadow:0 28px 70px rgba(0,0,0,.25);
  animation:popIn .3s cubic-bezier(.34,1.56,.64,1)}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.zy-big{font-size:clamp(4rem,18vw,7rem);font-weight:900;color:#7B68EE;line-height:1}
.zy-emoji-big{font-size:clamp(3rem,12vw,5rem);margin:8px 0}
.zy-d-word{font-size:clamp(2rem,8vw,3rem);font-weight:900;color:#E05555;margin:4px 0}
.zy-d-reading{font-size:clamp(1.1rem,4.5vw,1.6rem);color:#7B68EE;font-weight:800;margin:4px 0}
.modal-close{margin-top:14px;padding:12px 32px;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--coral),#FF8E53);color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;
  box-shadow:0 5px 0 #C0392B;-webkit-tap-highlight-color:transparent;width:100%}
.modal-close:active{transform:translateY(3px);box-shadow:0 2px 0 #C0392B}

/* ═══════ ABC 字母 ═══════ */
.abc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(105px,1fr));gap:11px;
  max-width:600px;width:100%}
.abc-card{background:#fff;border-radius:20px;padding:13px 8px 11px;text-align:center;
  cursor:pointer;box-shadow:0 5px 0 rgba(0,0,0,.08),0 9px 22px var(--shadow);
  transition:transform .15s;border:3px solid transparent;-webkit-tap-highlight-color:transparent}
.abc-card:hover{transform:translateY(-3px)}
.abc-card:active{transform:scale(.94)}
.abc-card.playing{animation:cpop .45s ease}
.abc-letter{font-family:'Fredoka One',cursive;font-size:clamp(2.4rem,10vw,3.6rem);line-height:1;display:block}
.abc-lower{font-size:clamp(1rem,4vw,1.5rem);font-weight:900;color:#ccc;margin-top:2px}
.abc-word{font-size:clamp(.8rem,3vw,1rem);font-weight:800;color:var(--dark);margin-top:4px}
.abc-emoji-s{font-size:clamp(1.5rem,6vw,2rem);display:block;margin-top:2px}
.abc-zh-s{font-size:clamp(.75rem,2.8vw,.92rem);color:#aaa;font-weight:800;margin-top:1px}
.abc-big{font-family:'Fredoka One',cursive;font-size:clamp(5rem,20vw,7.5rem);line-height:1}
.abc-small{font-family:'Fredoka One',cursive;font-size:clamp(3.5rem,14vw,5rem);color:#ddd;margin-left:10px}
.abc-d-emoji{font-size:clamp(3.5rem,14vw,5rem);margin:10px 0}
.abc-d-word{font-size:clamp(1.6rem,6.5vw,2.5rem);font-weight:900;color:var(--dark);margin:6px 0}
.abc-d-zh{font-size:clamp(1.1rem,4.5vw,1.5rem);color:#E05555;font-weight:900}
.abc-speak{margin-top:12px;padding:12px 0;border:none;border-radius:50px;
  background:linear-gradient(135deg,var(--blue),#0288D1);color:#fff;
  font-family:'Fredoka One',cursive;font-size:1.2rem;cursor:pointer;
  box-shadow:0 5px 0 #0277BD;width:100%;margin-bottom:8px;-webkit-tap-highlight-color:transparent}
.abc-speak:active{transform:translateY(3px);box-shadow:0 2px 0 #0277BD}
.abc-card:nth-child(7n+1) .abc-letter{color:#FF6B6B}
.abc-card:nth-child(7n+2) .abc-letter{color:#FF9A3C}
.abc-card:nth-child(7n+3) .abc-letter{color:#E6C800}
.abc-card:nth-child(7n+4) .abc-letter{color:#6BCB77}
.abc-card:nth-child(7n+5) .abc-letter{color:#4FC3F7}
.abc-card:nth-child(7n+6) .abc-letter{color:#B388FF}
.abc-card:nth-child(7n+0) .abc-letter{color:#FF80AB}

/* ═══════ DONE ═══════ */
#s-done{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);justify-content:center}
.done-emoji{font-size:5rem;animation:wiggle .6s ease-in-out infinite alternate;margin-bottom:8px}
@keyframes wiggle{from{transform:rotate(-10deg)}to{transform:rotate(10deg)}}
.done-title{font-family:'Fredoka One',cursive;font-size:clamp(1.9rem,8vw,3.2rem);
  color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.2);margin-bottom:5px;text-align:center}
.done-score{font-size:1rem;color:rgba(255,255,255,.9);font-weight:800;margin-bottom:16px;text-align:center}
.hdots{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:20px}
.hdot{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1rem;background:rgba(255,255,255,.2);animation:dpop .4s ease both}
.hdot.hit{background:rgba(107,203,119,.65)}.hdot.miss{background:rgba(255,107,107,.45)}
@keyframes dpop{from{transform:scale(0) rotate(-20deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
.done-btns{display:flex;flex-direction:column;gap:9px;align-items:center;width:100%;max-width:320px}
.dbtn{width:100%;border:none;border-radius:50px;padding:13px 32px;
  font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;
  transition:transform .1s;-webkit-tap-highlight-color:transparent;text-align:center}
.dbtn:active{transform:translateY(4px)}
.dbtn.prim{background:var(--sun);color:var(--dark);box-shadow:0 6px 0 #E6A800,0 10px 28px rgba(0,0,0,.2)}
.dbtn.sec{background:rgba(255,255,255,.2);color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.14);font-size:1rem}

/* ═══════ FEEDBACK / CONFETTI / SETTINGS ═══════ */
#feedback{
  position:fixed;top:50%;left:50%;z-index:500;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(255,255,255,.97);border-radius:26px;padding:22px 40px;
  text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);
  transition:transform .25s cubic-bezier(.34,1.56,.64,1);pointer-events:none;min-width:190px;
}
#feedback.show{transform:translate(-50%,-50%) scale(1)}
.fb-icon{font-size:3.4rem}.fb-text{font-family:'Fredoka One',cursive;font-size:1.7rem;margin-top:5px}
#feedback.ok .fb-text{color:var(--mint)}
#feedback.no .fb-text{color:var(--coral)}
.cp{position:fixed;pointer-events:none;z-index:600;animation:cpfall var(--d,1.5s) ease-in var(--dl,0s) forwards}
.cp.sq{width:11px;height:11px;border-radius:3px}.cp.ci{width:10px;height:10px;border-radius:50%}.cp.ri{width:5px;height:16px;border-radius:3px}
@keyframes cpfall{0%{opacity:1;transform:translateY(0) rotate(0) scale(1)}100%{opacity:0;transform:translateY(92vh) rotate(720deg) scale(.35)}}

#settings-btn{position:fixed;bottom:16px;right:16px;z-index:200;width:46px;height:46px;

<script>
/* ══════════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════════ */
let _ctx=null,musicOn=true,sfxOn=true;
function getCtx(){if(!_ctx)try{_ctx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){return null}if(_ctx.state==='suspended')_ctx.resume();return _ctx}
const Music={
  on:false,_tid:null,BPM:152,
  mel:[523,1,659,1,784,1,880,1,784,1,659,1,523,2,659,1,784,1,880,1,1047,1,880,1,784,1,659,2,523,1,880,1,784,1,659,1,523,1,784,1,659,2,523,1,659,1,784,1,659,1,523,1,880,2,523,2],
  bass:[130,4,174,4,130,4,174,4,130,4,174,4,98,4,130,4],
  _n(ctx,f,t,dur,type,vol){try{const o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type=type;o.frequency.value=f;g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.0001,t+dur*.84);o.start(t);o.stop(t+dur)}catch(e){}},
  schedule(){const ctx=getCtx();if(!ctx||!this.on)return;const b=60/this.BPM;let t=ctx.currentTime+.06,beats=0;for(let i=0;i<this.mel.length;i+=2){this._n(ctx,this.mel[i],t,b*this.mel[i+1]*.82,'triangle',.044);t+=b*this.mel[i+1];beats+=this.mel[i+1]}let bt=ctx.currentTime+.06;const bpb=beats/(this.bass.length/2);for(let i=0;i<this.bass.length;i+=2){this._n(ctx,this.bass[i],bt,b*bpb*.68,'sine',.03);bt+=b*bpb}this._tid=setTimeout(()=>{if(this.on)this.schedule()},beats*b*1000-100)},
  start(){if(!musicOn||this.on)return;this.on=true;this.schedule()},
  stop(){this.on=false;clearTimeout(this._tid)},
  toggle(){musicOn=!musicOn;musicOn?this.start():this.stop();return musicOn}
};
function sfxOk(){if(!sfxOn)return;const c=getCtx();if(!c)return;const n=c.currentTime;[[523,0],[659,.07],[784,.14],[1047,.22]].forEach(([f,t])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.14,n+t);g.gain.exponentialRampToValueAtTime(.001,n+t+.28);o.start(n+t);o.stop(n+t+.32)})}
function sfxNo(){if(!sfxOn)return;const c=getCtx();if(!c)return;const n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.setValueAtTime(260,n);o.frequency.exponentialRampToValueAtTime(100,n+.38);g.gain.setValueAtTime(.1,n);g.gain.exponentialRampToValueAtTime(.001,n+.42);o.start(n);o.stop(n+.45)}
function sfxWin(){if(!sfxOn)return;const c=getCtx();if(!c)return;const n=c.currentTime;[[523,0],[659,.1],[784,.2],[1047,.32],[1047,.52],[1047,.6],[1319,.72]].forEach(([f,t])=>{const o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(.15,n+t);g.gain.exponentialRampToValueAtTime(.001,n+t+.26);o.start(n+t);o.stop(n+t+.3)})}

/* ══════════════════════════════════════════
   VOICE SELECTION
══════════════════════════════════════════ */
let voiceList=[],chosenVoice=null;
function loadVoices(){if(!window.speechSynthesis)return;const u=()=>{voiceList=speechSynthesis.getVoices().filter(v=>v.lang.startsWith('en'));renderVoiceSel()};speechSynthesis.onvoiceschanged=u;u()}
function renderVoiceSel(){const s=document.getElementById('voice-select');if(!s)return;s.innerHTML='<option value="-1">🎙️ 系統預設</option>';voiceList.forEach((v,i)=>{const f=/female|samantha|karen|moira|victoria|ava|susan|lisa|kate|fiona|veena|zira|hazel|linda|zoe|heather/i.test(v.name);const o=document.createElement('option');o.value=i;o.textContent=`${f?'👩':'👨'} ${v.name} (${v.lang})`;s.appendChild(o)})}
function updateVoice(sel){const i=parseInt(sel.value);chosenVoice=i>=0?voiceList[i]:null}
function speak(word,cb){if(!window.speechSynthesis){cb&&cb();return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(word);if(chosenVoice)u.voice=chosenVoice;u.lang='en-US';u.rate=.82;u.pitch=1.05;if(cb)u.onend=cb;speechSynthesis.speak(u)}
/* 依序唸多段中文（用 queue 避免被 cancel 掉） */
function speakZHQueue(segments,idx){
  idx=idx||0;if(idx>=segments.length||!window.speechSynthesis)return;
  if(idx===0)speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(segments[idx]);u.lang='zh-TW';u.rate=.75;u.pitch=1.1;
  u.onend=()=>setTimeout(()=>speakZHQueue(segments,idx+1),200);
  speechSynthesis.speak(u);
}

/* ══════════════════════════════════════════
   DATA — 聽音配對 (with zy)
══════════════════════════════════════════ */
const CATS=[
  {id:'animals',name:'動物',icon:'🐾',color:'#6BCB77',items:[

  {L:'I',word:'Ice Cream',zh:'冰淇淋',emoji:'🍦'},{L:'J',word:'Juice',zh:'果汁',emoji:'🧃'},
  {L:'K',word:'Kite',zh:'風箏',emoji:'🪁'},{L:'L',word:'Lion',zh:'獅子',emoji:'🦁'},

const PRAISE_OK=['太棒了！🎉','答對了！🌟','好厲害！✨','完美！💯','正確！🎊','你真棒！⭐'];
const PRAISE_NO=['再試試看！','加油！💪','想一想～🤔','不對喔，再來！'];

/* ══════════════════════════════════════════
   STATE
══════════════════════════════════════════ */
let G={mode:'',catId:'',pool:[],round:0,score:0,history:[],TOTAL:8,qAns:'',qOk:true};
let curZy=null,curAbc=null,curSelf=null;

/* ══════════════════════════════════════════
   SCREENS / SETTINGS
══════════════════════════════════════════ */
function showScreen(id){document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));document.getElementById(id).classList.add('active')}
function openSettings(){document.getElementById('settings-panel').classList.add('open');document.getElementById('sp-overlay').classList.add('show')}
function closeSettings(){document.getElementById('settings-panel').classList.remove('open');document.getElementById('sp-overlay').classList.remove('show')}
function toggleMusic(b){const on=Music.toggle();b.classList.toggle('on',on)}
function toggleSfx(b){sfxOn=!sfxOn;b.classList.toggle('on',sfxOn)}

/* ══════════════════════════════════════════
   聽音配對 — CATEGORY + QUIZ
══════════════════════════════════════════ */
function pickMode(mode){G.mode=mode;buildCatGrid();showScreen('s-cat')}
function buildCatGrid(){
  const g=document.getElementById('cat-grid');g.innerHTML='';
  CATS.forEach(c=>{const d=document.createElement('div');d.className='cat-card';d.style.borderTop=`4px solid ${c.color}`;
    d.innerHTML=`<span class="c-icon">${c.icon}</span><div class="c-name" style="color:${c.color}">${c.name}</div><div class="c-count">${c.items.length} 個單字</div>`;
    d.onclick=()=>startGame(c.id);g.appendChild(d)});
  const a=document.createElement('div');a.className='cat-card all';a.style.borderTop='4px solid #667eea';
  a.innerHTML=`<span class="c-icon">🌈</span><div class="c-name" style="color:#667eea">全部混合</div><div class="c-count">${ALL.length} 個單字</div>`;
  a.onclick=()=>startGame('all');g.appendChild(a);
}
function startGame(catId){
  G.catId=catId;G.round=0;G.score=0;G.history=[];
  const src=catId==='all'?ALL:CATS.find(c=>c.id===catId).items;
  G.pool=shuffle([...src]);
  const cat=catId==='all'?{name:'全部混合',icon:'🌈'}:CATS.find(c=>c.id===catId);
  document.getElementById('q-cat').textContent=`${cat.icon} ${cat.name}`;
  Music.start();showScreen('s-quiz');quizNext();
}
function quizNext(){
  if(G.round>=G.TOTAL){showDone();return}G.qOk=true;G.round++;
  const item=G.pool[(G.round-1)%G.pool.length];G.qAns=item.w;
  document.getElementById('q-word').textContent=item.w;
  document.getElementById('q-zh').textContent=item.z;
  document.getElementById('q-zy').textContent=item.zy||'';
  updateQuizUI();
  const pool=G.catId==='all'?ALL:CATS.find(c=>c.id===G.catId).items;
  const others=shuffle(pool.filter(x=>x.w!==item.w)).slice(0,3);
  renderOpts(shuffle([item,...others]));
  setTimeout(()=>quizSpeak(),420);
}
function renderOpts(opts){const g=document.getElementById('quiz-grid');g.innerHTML='';opts.forEach(o=>{
  const d=document.createElement('div');d.className='opt-card';
  d.innerHTML=`<span class="oe">${o.e}</span><div class="on">${o.w}</div><div class="oz">${o.z}</div><div class="oz-zy">${o.zy||''}</div>`;
  d.addEventListener('click',()=>handleQuiz(o.w,d));g.appendChild(d)})}
function handleQuiz(chosen,card){
  if(!G.qOk)return;G.qOk=false;
  const all=document.querySelectorAll('.opt-card');
  if(chosen===G.qAns){G.score++;G.history.push(true);card.classList.add('correct','reveal');
    all.forEach(c=>{if(c!==card)c.classList.add('disabled')});sfxOk();confetti(36);speak(G.qAns);
    updateQuizUI();setTimeout(()=>{hideFB();quizNext()},1700);
  }else{G.history.push(false);card.classList.add('wrong');sfxNo();updateQuizUI();
    setTimeout(()=>{card.classList.remove('wrong');hideFB();G.qOk=true;G.history.pop()},900)}
  showFB(chosen===G.qAns);
}
function quizSpeak(){const b=document.getElementById('q-sb');b.classList.add('speaking');
  speak(G.qAns,()=>b.classList.remove('speaking'));
  const w=document.getElementById('q-word');w.classList.remove('bounce');void w.offsetWidth;w.classList.add('bounce')}
function updateQuizUI(){document.getElementById('q-score').textContent=`⭐ ${G.score}`;
  document.getElementById('q-pl').textContent=`第 ${G.round} 題`;document.getElementById('q-pr').textContent=`${G.score} / ${G.TOTAL}`;
  document.getElementById('q-pf').style.width=((G.round-1)/G.TOTAL*100)+'%'}

/* ══════════════════════════════════════════
   認識自己
══════════════════════════════════════════ */
function buildSelf(filter){
  filter=filter||'身體';const g=document.getElementById('self-grid');g.innerHTML='';
  const list=filter==='all'?SELF.flatMap(s=>s.items):SELF.find(s=>s.cat===filter)?.items||[];
  list.forEach(it=>{const c=document.createElement('div');c.className='self-card';
    c.innerHTML=`<span class="self-emoji">${it.e}</span><div class="self-en">${it.w}</div><div class="self-zh">${it.z}</div>`;
    c.addEventListener('click',()=>openSelf(it,c));g.appendChild(c)});
}
function filterSelf(cat,btn){document.querySelectorAll('.self-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildSelf(cat)}
function openSelf(it,card){
  curSelf=it;
  document.getElementById('self-m-emoji').textContent=it.e;
  document.getElementById('self-m-zh').textContent=it.z;
  document.getElementById('self-m-zy').textContent=it.zy;
  document.getElementById('self-m-en').textContent=it.w;
  document.getElementById('self-modal').classList.add('show');
  card.classList.add('playing');setTimeout(()=>card.classList.remove('playing'),500);
  speakSelfCurrent();
}
function closeSelfModal(){document.getElementById('self-modal').classList.remove('show')}
function speakSelfCurrent(){
  if(!curSelf)return;
  // 先唸中文，再唸英文
  speakZHQueue([curSelf.z]);
  setTimeout(()=>speak(curSelf.w),1200);
}

/* ══════════════════════════════════════════
   注音學習 — 先唸注音符號，再唸注音讀法，再唸詞彙
   例：ㄊ → ㄊㄞˋ ㄧㄤˊ → 太陽
══════════════════════════════════════════ */
function buildZhuyin(filter){
  filter=filter||'聲母';const g=document.getElementById('zy-grid');g.innerHTML='';
  const list=filter==='all'?ZHUYIN:ZHUYIN.filter(z=>z.cat===filter);
  list.forEach(z=>{const c=document.createElement('div');c.className='zy-card';
    c.innerHTML=`<span class="zy-sym">${z.sym}</span><div class="zy-type">${z.cat}</div><div class="zy-example">${z.word}</div><div class="zy-reading">${z.zy}</div>`;
    c.addEventListener('click',()=>openZy(z,c));g.appendChild(c)});
}
function filterZy(cat,btn){document.querySelectorAll('.zy-cat-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');buildZhuyin(cat)}
function openZy(z,card){
  curZy=z;
  document.getElementById('zy-m-sym').textContent=z.sym;
  document.getElementById('zy-m-emoji').textContent=z.emoji;
  document.getElementById('zy-m-word').textContent=z.word;
  document.getElementById('zy-m-zy').textContent=z.zy;
  document.getElementById('zy-modal').classList.add('show');
  card.classList.add('playing');setTimeout(()=>card.classList.remove('playing'),500);
  speakZyCurrent();
}
function closeZyModal(){document.getElementById('zy-modal').classList.remove('show')}
/* 核心：先唸注音符號 → 再唸注音讀法 → 再唸詞彙 */
function speakZyCurrent(){
  if(!curZy)return;
  // 例：「ㄊ」→「ㄊㄞˋ ㄧㄤˊ」→「太陽」
  speakZHQueue([curZy.sym, curZy.zy, curZy.word]);
}

/* ══════════════════════════════════════════
   ABC 字母
══════════════════════════════════════════ */
const LC=['#FF6B6B','#FF9A3C','#E6C800','#6BCB77','#4FC3F7','#B388FF','#FF80AB'];
function buildABC(){const g=document.getElementById('abc-grid');g.innerHTML='';
  ABC.forEach((a,i)=>{const c=document.createElement('div');c.className='abc-card';const col=LC[i%7];
    c.innerHTML=`<span class="abc-letter" style="color:${col}">${a.L}</span><div class="abc-lower">${a.L.toLowerCase()}</div><span class="abc-emoji-s">${a.emoji}</span><div class="abc-word">${a.word}</div><div class="abc-zh-s">${a.zh}</div>`;
    c.addEventListener('click',()=>openAbc(a,c,col));g.appendChild(c)})}
function openAbc(a,card,col){curAbc=a;document.getElementById('abc-m-up').textContent=a.L;document.getElementById('abc-m-up').style.color=col;
  document.getElementById('abc-m-dn').textContent=a.L.toLowerCase();document.getElementById('abc-m-emoji').textContent=a.emoji;
  document.getElementById('abc-m-word').textContent=a.word;document.getElementById('abc-m-zh').textContent=a.zh;
  document.getElementById('abc-modal').classList.add('show');card.classList.add('playing');setTimeout(()=>card.classList.remove('playing'),500);speak(a.L+'... '+a.word)}
function closeAbcModal(){document.getElementById('abc-modal').classList.remove('show')}
function speakAbc(){if(curAbc)speak(curAbc.L+'... '+curAbc.word)}

/* ══════════════════════════════════════════
   DONE / FEEDBACK / CONFETTI
══════════════════════════════════════════ */
function showDone(){hideFB();const pct=Math.round(G.score/G.TOTAL*100);let e,t;
  if(G.score===G.TOTAL){e='🏆';t='滿分超人！'}else if(G.score>=6){e='🌟';t='超級棒！'}else if(G.score>=4){e='🎈';t='繼續加油！'}else{e='🐣';t='再練習一次！'}
  document.getElementById('done-emoji').textContent=e;document.getElementById('done-title').textContent=t;
  document.getElementById('done-score').textContent=`${G.TOTAL} 題答對 ${G.score} 題  ${pct}%`;
  const dots=document.getElementById('done-dots');dots.innerHTML='';
  G.history.forEach((hit,i)=>{const d=document.createElement('div');d.className=`hdot ${hit?'hit':'miss'}`;d.textContent=hit?'⭐':'✗';d.style.animationDelay=(i*.07)+'s';dots.appendChild(d)});
  document.getElementById('done-replay').onclick=()=>startGame(G.catId);sfxWin();confetti(52);setTimeout(()=>confetti(40),600);showScreen('s-done')}
function showFB(ok){const fb=document.getElementById('feedback');document.getElementById('fb-icon').textContent=ok?['🎉','🌟','✨','🎊'][Math.floor(Math.random()*4)]:['🙈','😅','🤔'][Math.floor(Math.random()*3)];
  document.getElementById('fb-text').textContent=ok?PRAISE_OK[Math.floor(Math.random()*PRAISE_OK.length)]:PRAISE_NO[Math.floor(Math.random()*PRAISE_NO.length)];fb.className='show '+(ok?'ok':'no')}
function hideFB(){document.getElementById('feedback').className=''}
function confetti(n=36){const colors=['#FFD93D','#FF6B6B','#6BCB77','#C77DFF','#FF9A3C','#87CEEB','#FF85A1','#A0E7E5'];const shapes=['sq','ci','ri'];
  for(let i=0;i<n;i++){const el=document.createElement('div');const sh=shapes[Math.floor(Math.random()*shapes.length)];const dl=(Math.random()*.45).toFixed(2);const dur=(1.1+Math.random()*.9).toFixed(2);
    el.className=`cp ${sh}`;el.style.cssText=`left:${6+Math.random()*88}vw;top:-18px;background:${colors[Math.floor(Math.random()*colors.length)]};--d:${dur}s;--dl:${dl}s;animation-delay:${dl}s;animation-duration:${dur}s;transform:rotate(${Math.random()*360}deg)`;
    document.body.appendChild(el);el.addEventListener('animationend',()=>el.remove())}}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}

/* ══════════════════════════════════════════
   VOCAB MANAGER — 家長詞彙管理後台
══════════════════════════════════════════ */
const VM_KEY='kidsvocab_custom';
let vmCat='animals',vmEditIdx=-1;
// 預設資料深拷貝
const DEFAULT_CATS=JSON.parse(JSON.stringify(CATS.map(c=>({id:c.id,name:c.name,icon:c.icon,color:c.color,items:[...c.items]}))));

function vmLoadCustom(){
  try{const d=localStorage.getItem(VM_KEY);if(d){const parsed=JSON.parse(d);
    parsed.forEach(cc=>{const target=CATS.find(c=>c.id===cc.id);if(target)target.items=cc.items});
    // rebuild ALL
    rebuildALL();
  }}catch(e){}
}
function vmSaveCustom(){
  localStorage.setItem(VM_KEY,JSON.stringify(CATS.map(c=>({id:c.id,items:c.items}))));
  rebuildALL();
}
function rebuildALL(){ALL.length=0;CATS.forEach(c=>c.items.forEach(it=>ALL.push({...it,_cid:c.id})))}

function vmInit(){
  // build tabs
  const tabs=document.getElementById('vm-tabs');tabs.innerHTML='';
  CATS.forEach(c=>{const b=document.createElement('button');b.className='vm-tab'+(c.id===vmCat?' active':'');
    b.textContent=`${c.icon} ${c.name}`;b.onclick=()=>{vmCat=c.id;vmInit()};tabs.appendChild(b)});
  vmCancelForm();vmRenderList();
}
function vmRenderList(){
  const list=document.getElementById('vm-list');list.innerHTML='';
  const cat=CATS.find(c=>c.id===vmCat);if(!cat)return;
  cat.items.forEach((it,i)=>{
    const d=document.createElement('div');d.className='vm-item';
    d.innerHTML=`<span class="vm-emoji">${it.e}</span><div class="vm-info"><div class="vm-w">${it.w}</div><div class="vm-z">${it.z}</div><div class="vm-zy">${it.zy||''}</div></div><button class="vm-edit" onclick="vmStartEdit(${i})">✏️</button><button class="vm-del" onclick="vmDel(${i})">🗑️</button>`;
    list.appendChild(d)});
}
function vmShowAdd(){vmEditIdx=-1;const f=document.getElementById('vm-form');f.classList.add('show');
  ['vm-w','vm-e','vm-zh','vm-zy'].forEach(id=>document.getElementById(id).value='')}
function vmStartEdit(i){
  const cat=CATS.find(c=>c.id===vmCat);if(!cat)return;
  vmEditIdx=i;const it=cat.items[i];
  document.getElementById('vm-w').value=it.w;document.getElementById('vm-e').value=it.e;
  document.getElementById('vm-zh').value=it.z;document.getElementById('vm-zy').value=it.zy||'';
  document.getElementById('vm-form').classList.add('show');
}
function vmCancelForm(){document.getElementById('vm-form').classList.remove('show');vmEditIdx=-1}
function vmSave(){
  const w=document.getElementById('vm-w').value.trim().toUpperCase();
  const e=document.getElementById('vm-e').value.trim();
  const z=document.getElementById('vm-zh').value.trim();
  const zy=document.getElementById('vm-zy').value.trim();
  if(!w||!e||!z){alert('請至少填寫英文、Emoji 和中文');return}
  const cat=CATS.find(c=>c.id===vmCat);if(!cat)return;
  const item={w,e,z,zy};
  if(vmEditIdx>=0){cat.items[vmEditIdx]=item}else{cat.items.push(item)}
  vmSaveCustom();vmCancelForm();vmRenderList();
}
function vmDel(i){
  const cat=CATS.find(c=>c.id===vmCat);if(!cat)return;
  if(!confirm(`確定刪除「${cat.items[i].z}」？`))return;
  cat.items.splice(i,1);vmSaveCustom();vmRenderList();
}
function vmReset(){
  if(!confirm('確定恢復所有預設詞彙？自訂的修改將被清除。'))return;
  localStorage.removeItem(VM_KEY);
  DEFAULT_CATS.forEach(dc=>{const t=CATS.find(c=>c.id===dc.id);if(t)t.items=JSON.parse(JSON.stringify(dc.items))});
  rebuildALL();vmRenderList();
}

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
window.addEventListener('DOMContentLoaded',()=>{
  vmLoadCustom();loadVoices();buildSelf();buildZhuyin();buildABC();
  setTimeout(()=>{document.getElementById('splash').classList.add('hidden');setTimeout(()=>document.getElementById('splash').remove(),600)},1200);
});
</script>
